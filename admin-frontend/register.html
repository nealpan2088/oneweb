<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2; url=/saas-frontend/register.html">
    <title>重定向到SaaS注册页面</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 15px;
            line-height: 1.6;
        }
        a {
            color: #ffdd40;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 云信旺店 SaaS 平台</h1>
        <p>您正在访问的是 <strong>SaaS（软件即服务）版本</strong>的注册页面。</p>
        <p>系统将自动跳转到正确的注册页面...</p>
        
        <div class="spinner"></div>
        
        <p>如果页面没有自动跳转，请点击：</p>
        <p><a href="/saas-frontend/register.html">👉 前往 SaaS 注册页面</a></p>
        
        <p style="margin-top: 30px; font-size: 14px; opacity: 0.8;">
            提示：单店版和SaaS版使用不同的管理后台。<br>
            SaaS版支持多店铺管理，功能更加强大。
        </p>
    </div>
</body>
</html>
