<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云信旺店管理后台 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        /* 顶部导航 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 20px; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        
        /* 主体内容 */
        .main { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
        
        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 8px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #333; }
        
        /* 快捷操作 */
        .quick-actions { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .quick-actions h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .action-btn { padding: 16px; border: 2px solid #e0e0e0; border-radius: 8px; background: white; cursor: pointer; text-align: left; transition: all 0.2s; }
        .action-btn:hover { border-color: #667eea; background: #f9f9ff; }
        .action-btn h3 { font-size: 16px; color: #333; margin-bottom: 4px; }
        .action-btn p { font-size: 13px; color: #666; }
        
        /* 最近日志 */
        .recent-logs { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .recent-logs h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
        .log-table { width: 100%; border-collapse: collapse; }
        .log-table th, .log-table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .log-table th { background: #f9f9f9; color: #666; font-weight: 500; font-size: 13px; }
        .log-table td { font-size: 14px; }
        .log-action { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .log-action.update { background: #e3f2fd; color: #1976d2; }
        .log-action.login { background: #e8f5e9; color: #388e3c; }
        .log-action.create { background: #fff3e0; color: #f57c00; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏪 云信旺店管理后台</h1>
        <div class="user-info">
            <span id="welcomeText">欢迎</span>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="main">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>店铺数量</h3>
                <div class="number" id="shopCount">-</div>
            </div>
            <div class="stat-card">
                <h3>管理员数量</h3>
                <div class="number" id="userCount">-</div>
            </div>
            <div class="stat-card">
                <h3>今日操作</h3>
                <div class="number" id="todayLogs">-</div>
            </div>
            <div class="stat-card">
                <h3>系统状态</h3>
                <div class="number" style="font-size: 20px;">✅ 正常</div>
            </div>
        </div>
        
        <!-- 快捷操作 -->
        <div class="quick-actions">
            <h2>⚡ 快捷操作</h2>
            <div class="action-grid">
                <div class="action-btn" onclick="location.href='/admin/shops.html'">
                    <h3>🏪 店铺管理</h3>
                    <p>编辑店铺资料、配置门店类型和主题</p>
                </div>
                <div class="action-btn" onclick="location.href='/admin/users.html'">
                    <h3>👥 用户管理</h3>
                    <p>管理管理员账号和权限</p>
                </div>
                <div class="action-btn" onclick="location.href='/admin/logs.html'">
                    <h3>📋 操作日志</h3>
                    <p>查看系统操作记录</p>
                </div>
                <div class="action-btn" onclick="location.href='/admin/settings.html'">
                    <h3>⚙️ 系统配置</h3>
                    <p>配置系统参数</p>
                </div>
            </div>
        </div>
        
        <!-- 最近操作日志 -->
        <div class="recent-logs">
            <h2>📝 最近操作</h2>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>操作人</th>
                        <th>操作</th>
                        <th>目标</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr><td colspan="5" style="text-align:center;color:#999;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        // 检查登录
        const token = localStorage.getItem('admin_token');
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        
        if (!token) {
            window.location.href = '/admin/login.html';
        }
        
        document.getElementById('welcomeText').textContent = `欢迎，${user.username || '管理员'}`;
        
        // 退出登录
        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.href = '/admin/login.html';
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                const [shopsRes, usersRes, logsRes] = await Promise.all([
                    fetch(`${API_BASE}/api/admin/shops?limit=1`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_BASE}/api/admin/users?limit=1`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_BASE}/api/admin/logs?limit=10`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                
                const shops = await shopsRes.json();
                const users = await usersRes.json();
                const logs = await logsRes.json();
                
                document.getElementById('shopCount').textContent = shops.pagination?.total || 0;
                document.getElementById('userCount').textContent = users.pagination?.total || 0;
                
                // 今日操作数
                const today = new Date().toISOString().split('T')[0];
                const todayLogs = logs.logs?.filter(log => log.created_at.startsWith(today)).length || 0;
                document.getElementById('todayLogs').textContent = todayLogs;
                
                // 加载最近日志
                loadLogs(logs.logs || []);
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }
        
        // 加载日志
        function loadLogs(logs) {
            const tbody = document.getElementById('logsBody');
            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;">暂无操作记录</td></tr>';
                return;
            }
            
            tbody.innerHTML = logs.slice(0, 5).map(log => `
                <tr>
                    <td>${new Date(log.created_at).toLocaleString('zh-CN')}</td>
                    <td>${log.operator_name || log.username || '-'}</td>
                    <td><span class="log-action ${log.action}">${log.action}</span></td>
                    <td>${log.target_name || log.target_type || '-'}</td>
                    <td>${log.status === 'success' ? '✅' : '❌'}</td>
                </tr>
            `).join('');
        }
        
        // 页面加载
        loadStats();
    </script>
</body>
</html>
