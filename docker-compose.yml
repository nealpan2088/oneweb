version: '3.8'

services:
  app:
    build: .
    container_name: yunxin-wangdian
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/database/shop.db
      - TRUST_PROXY=true
      # 生产环境请修改以下密钥
      - ENCRYPTION_KEY=change-this-key-in-production-32chars!
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

