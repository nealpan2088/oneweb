<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线模式 - IT技术服务站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #4361ee, #7209b7);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }
        
        .offline-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 30px;
            color: #ffd166;
            animation: pulse 2s infinite;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: blink 1.5s infinite;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .feature-icon {
            font-size: 32px;
            margin-bottom: 15px;
            color: #4cc9f0;
        }
        
        .feature h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .feature p {
            font-size: 14px;
            margin-bottom: 0;
            opacity: 0.8;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: white;
            color: #4361ee;
        }
        
        .btn-primary:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .connection-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        
        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        
        @media (max-width: 768px) {
            .offline-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            p {
                font-size: 16px;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        
        <h1>网络连接已断开</h1>
        
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>离线模式</span>
        </div>
        
        <p>
            当前网络连接不可用，您正在使用离线模式。
            部分需要网络的功能可能无法使用，但您可以继续浏览已缓存的内容。
        </p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">
                    <i class="fas fa-eye"></i>
                </div>
                <h3>浏览内容</h3>
                <p>查看已缓存的页面和图片</p>
            </div>
            
            <div class="feature">
                <div class="feature-icon">
                    <i class="fas fa-edit"></i>
                </div>
                <h3>离线留言</h3>
                <p>提交留言，网络恢复后自动发送</p>
            </div>
            
            <div class="feature">
                <div class="feature-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h3>PWA支持</h3>
                <p>可安装到手机桌面使用</p>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="window.location.reload()">
                <i class="fas fa-sync-alt"></i>
                重新加载
            </button>
            
            <button class="btn btn-secondary" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
                返回上一页
            </button>
            
            <a href="/it-tech-service/" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                返回首页
            </a>
        </div>
        
        <div class="connection-info">
            <p>
                <i class="fas fa-info-circle"></i>
                网络恢复后，页面将自动更新并同步离线数据。
            </p>
        </div>
    </div>

    <script>
        // 检测网络状态
        function updateOnlineStatus() {
            const statusDot = document.querySelector('.status-dot');
            const statusText = document.querySelector('.status-indicator span');
            
            if (navigator.onLine) {
                statusDot.style.background = '#4ade80';
                statusDot.style.animation = 'none';
                statusText.textContent = '在线模式';
                
                // 网络恢复后，3秒后自动刷新
                setTimeout(() => {
                    window.location.reload();
                }, 3000);
            } else {
                statusDot.style.background = '#ff6b6b';
                statusDot.style.animation = 'blink 1.5s infinite';
                statusText.textContent = '离线模式';
            }
        }
        
        // 初始状态
        updateOnlineStatus();
        
        // 监听网络状态变化
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        
        // 尝试重新连接
        function tryReconnect() {
            if (navigator.onLine) {
                window.location.reload();
            } else {
                setTimeout(tryReconnect, 5000); // 5秒后重试
            }
        }
        
        // 自动重连
        setTimeout(tryReconnect, 10000); // 10秒后开始尝试重连
    </script>
</body>
</html>
