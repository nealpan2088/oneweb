<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务状态监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .service-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .status-indicator {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-up {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-down {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status-warning {
            background: #feebc8;
            color: #744210;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .info-label {
            color: #666;
            font-weight: 500;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        
        .btn-danger {
            background: #fc8181;
            color: white;
        }
        
        .btn-danger:hover {
            background: #f56565;
        }
        
        .refresh-btn {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 12px 24px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .timestamp {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .status-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🦞 云信旺店服务监控面板</h1>
            <p>实时监控所有API服务和系统状态</p>
        </div>
        
        <div class="status-grid" id="statusGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载服务状态...</p>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadAllStatus()">
            🔄 刷新状态
        </button>
        
        <div class="timestamp" id="timestamp">
            最后更新: 加载中...
        </div>
    </div>
    
    <script>
        // 服务配置 - 使用相对路径，避免localhost问题
        const SERVICES = [
            {
                id: 'old-api',
                name: '旧版API服务',
                url: '/health',  // 相对路径，通过Nginx代理
                port: 3000,
                description: '生产环境API，前端正在使用',
                endpoints: [
                    { name: '店铺信息', url: '/api/shop/3' },
                    { name: '评价列表', url: '/api/shop/3/reviews' },
                    { name: '统计信息', url: '/api/shop/3/stats' }
                ]
            },
            {
                id: 'new-api',
                name: '新版API服务',
                url: '/health-new',  // 相对路径，通过Nginx代理
                port: 3002,
                description: '测试环境API，规范化版本',
                endpoints: [
                    { name: '店铺信息', url: '/api/v1/shops/3' },
                    { name: '评价列表', url: '/api/v1/shops/3/reviews' },
                    { name: '统计信息', url: '/api/v1/shops/3/stats' },
                    { name: 'API文档', url: '/api/v1/docs' }
                ]
            },
            {
                id: 'nginx',
                name: 'Nginx Web服务器',
                url: '/',  // 相对路径
                port: 80,
                description: '反向代理和静态文件服务',
                endpoints: [
                    { name: '个人作品集', url: '/' },
                    { name: '店铺页面', url: '/shop_index.html' },
                    { name: '现代前端', url: '/shop_index_modern.html' },
                    { name: '测试页面', url: '/test_new_api.html' }
                ]
            },
            {
                id: 'database',
                name: 'SQLite数据库',
                check: async () => {
                    try {
                        const response = await fetch('/health');  // 相对路径
                        const data = await response.json();
                        return data.database === 'ok';
                    } catch (error) {
                        return false;
                    }
                },
                description: '店铺数据存储',
                info: 'shop.db (约70MB)'
            }
        ];
        
        // 检查服务状态
        async function checkServiceStatus(service) {
            const startTime = Date.now();
            
            try {
                let status, data, responseTime;
                
                if (service.check) {
                    // 自定义检查函数
                    const isOk = await service.check();
                    status = isOk ? 200 : 500;
                    data = { status: isOk ? 'ok' : 'error' };
                    responseTime = Date.now() - startTime;
                } else {
                    // 标准HTTP检查 - 使用相对路径
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);
                    
                    const response = await fetch(service.url, {
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    responseTime = Date.now() - startTime;
                    status = response.status;
                    data = await response.json().catch(() => ({}));
                }
                
                return {
                    id: service.id,
                    name: service.name,
                    status: status,
                    responseTime: responseTime,
                    data: data,
                    isUp: status === 200 || (data && (data.status === 'ok' || data.success === true)),
                    timestamp: new Date().toISOString()
                };
            } catch (error) {
                return {
                    id: service.id,
                    name: service.name,
                    status: 0,
                    responseTime: Date.now() - startTime,
                    data: { 
                        error: error.message,
                        suggestion: '服务可能未运行或网络问题',
                        url: service.url
                    },
                    isUp: false,
                    timestamp: new Date().toISOString()
                };
            }
        }
        
        // 获取状态文本
        function getStatusText(status) {
            if (status === 200) return '运行正常';
            if (status === 0) return '连接失败';
            return `错误: ${status}`;
        }
        
        // 获取状态类名
        function getStatusClass(status, isUp) {
            if (status === 200 && isUp) return 'status-up';
            if (status === 0) return 'status-down';
            return 'status-warning';
        }
        
        // 格式化时间
        function formatTime(ms) {
            if (ms < 1000) return `${ms}ms`;
            return `${(ms / 1000).toFixed(2)}s`;
        }
        
        // 创建状态卡片
        function createStatusCard(service, result) {
            const statusText = getStatusText(result.status);
            const statusClass = getStatusClass(result.status, result.isUp);
            
            return `
                <div class="status-card">
                    <div class="card-header">
                        <div class="service-name">${service.name}</div>
                        <div class="status-indicator ${statusClass}">${statusText}</div>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">描述</span>
                        <span class="info-value">${service.description}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">端口</span>
                        <span class="info-value">${service.port || 'N/A'}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">响应时间</span>
                        <span class="info-value">${formatTime(result.responseTime)}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">状态码</span>
                        <span class="info-value">${result.status || 'N/A'}</span>
                    </div>
                    
                    ${service.info ? `
                    <div class="info-row">
                        <span class="info-label">附加信息</span>
                        <span class="info-value">${service.info}</span>
                    </div>
                    ` : ''}
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="window.open('${service.url}', '_blank')">
                            测试连接
                        </button>
                        <button class="btn btn-secondary" onclick="showEndpoints('${service.id}')">
                            查看端点
                        </button>
                        ${service.id === 'new-api' ? `
                        <button class="btn btn-danger" onclick="restartNewApi()">
                            重启服务
                        </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        // 显示端点信息
        function showEndpoints(serviceId) {
            const service = SERVICES.find(s => s.id === serviceId);
            if (!service || !service.endpoints) return;
            
            let message = `📡 ${service.name} 可用端点:\n\n`;
            service.endpoints.forEach(endpoint => {
                const fullUrl = `http://localhost:${service.port}${endpoint.url}`;
                message += `• ${endpoint.name}: ${fullUrl}\n`;
            });
            
            alert(message);
        }
        
        // 重启新版API
        async function restartNewApi() {
            if (!confirm('确定要重启新版API服务吗？')) return;
            
            try {
                const response = await fetch('http://localhost:3002/health');
                if (response.ok) {
                    alert('新版API正在运行，无需重启');
                    return;
                }
            } catch (error) {
                // API未运行，可以重启
            }
            
            alert('正在重启新版API服务...\n请等待几秒钟后刷新页面查看状态。');
            
            // 这里可以添加实际的重启逻辑
            // 例如通过SSH或API调用重启服务
        }
        
        // 加载所有状态
        async function loadAllStatus() {
            const grid = document.getElementById('statusGrid');
            grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在检查服务状态...</p></div>';
            
            try {
                // 并行检查所有服务
                const promises = SERVICES.map(service => checkServiceStatus(service));
                const results = await Promise.all(promises);
                
                // 更新显示
                grid.innerHTML = results.map((result, index) => 
                    createStatusCard(SERVICES[index], result)
                ).join('');
                
                // 更新时间戳
                document.getElementById('timestamp').textContent = 
                    `最后更新: ${new Date().toLocaleString('zh-CN')}`;
                    
            } catch (error) {
                grid.innerHTML = `
                    <div class="status-card">
                        <div class="card-header">
                            <div class="service-name">状态检查失败</div>
                            <div class="status-indicator status-down">错误</div>
                        </div>
                        <p style="color: #666; margin-top: 20px;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 页面加载时自动检查
        window.onload = function() {
            loadAllStatus();
            
            // 每30秒自动刷新
            setInterval(loadAllStatus, 30000);
        };
    </script>
</body>
</html>
